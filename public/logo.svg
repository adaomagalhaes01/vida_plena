<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#AA812A"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7E080"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>

  <!-- Outer Circle -->
  <circle cx="100" cy="90" r="75" stroke="url(#gold)" stroke-width="2.5" fill="none"/>

  <!-- Human face profile (simplified) -->
  <!-- Head silhouette -->
  <path d="M105 30 C125 32 140 50 140 72 C140 88 132 100 120 108 L118 115 L108 112 L106 118 L96 115 L94 108 C82 100 74 88 74 72 C74 50 85 30 105 30Z"
        fill="url(#gold)" opacity="0.85"/>

  <!-- Hand below face -->
  <path d="M78 120 C68 115 60 108 58 100 C72 105 84 110 98 112 L106 118 L98 124 C92 128 84 126 78 120Z"
        fill="url(#gold)"/>

  <!-- Brain/flower symbol on head (simplified rose/brain) -->
  <ellipse cx="97" cy="52" rx="10" ry="12" fill="none" stroke="url(#goldLight)" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="109" cy="48" rx="8" ry="10" fill="none" stroke="url(#goldLight)" stroke-width="1.5" opacity="0.9"/>
  <circle cx="100" cy="50" r="3" fill="url(#gold)"/>

  <!-- Flower petals -->
  <ellipse cx="88" cy="45" rx="5" ry="8" fill="url(#goldLight)" opacity="0.7" transform="rotate(-30 88 45)"/>
  <ellipse cx="112" cy="43" rx="5" ry="8" fill="url(#goldLight)" opacity="0.7" transform="rotate(20 112 43)"/>
  <ellipse cx="100" cy="38" rx="5" ry="8" fill="url(#goldLight)" opacity="0.7"/>

  <!-- Leaf stem -->
  <line x1="100" y1="58" x2="100" y2="80" stroke="url(#gold)" stroke-width="2"/>
  <ellipse cx="108" cy="68" rx="8" ry="4" fill="url(#goldLight)" opacity="0.8" transform="rotate(30 108 68)"/>
  <ellipse cx="92" cy="74" rx="8" ry="4" fill="url(#goldLight)" opacity="0.8" transform="rotate(-30 92 74)"/>

  <!-- Heart ribbon (bottom right of circle) -->
  <path d="M132 100 C132 100 140 106 138 112 C136 118 130 118 128 114 C126 118 120 118 118 112 C116 106 124 100 128 100 C129.5 99 131 99.5 132 100Z"
        fill="url(#gold)" opacity="0.9"/>
  <!-- Ribbon tail -->
  <path d="M125 112 L122 122 L128 118 L134 122 L131 112Z" fill="url(#gold)" opacity="0.85"/>

  <!-- Decorative dots/lines for the text separator -->
  <line x1="40" y1="170" x2="75" y2="170" stroke="url(#gold)" stroke-width="1" opacity="0.7"/>
  <circle cx="100" cy="170" r="2" fill="url(#gold)"/>
  <line x1="125" y1="170" x2="160" y2="170" stroke="url(#gold)" stroke-width="1" opacity="0.7"/>

  <!-- Small lotus ornament below -->
  <path d="M95 182 C93 178 90 176 88 177 C86 178 87 182 90 183 L95 185 L100 182 L105 185 L110 183 C113 182 114 178 112 177 C110 176 107 178 105 182Z"
        fill="url(#gold)" opacity="0.8"/>
</svg>
